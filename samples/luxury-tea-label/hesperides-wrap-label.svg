<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="306mm" height="146mm" viewBox="0 0 3060 1460"
     role="img" aria-labelledby="title desc">
  <title id="title">Hesperides luxury tea wrap-label style study</title>
  <desc id="desc">A self-initiated packaging study with an engraved Hesperides illustration, antiquarian wordmark, side copy panels, a separate gold preview layer, trim, bleed, and safe-area guides.</desc>

  <defs>
    <style>
      .display { font-family: "Bodoni 72 Smallcaps", "Bodoni 72", Didot, Baskerville, serif; }
      .serif { font-family: Baskerville, "Iowan Old Style", Georgia, serif; }
      .sans { font-family: Avenir Next, Avenir, Helvetica, Arial, sans-serif; }
      .forest { fill: #173b2c; }
      .forest-stroke { stroke: #173b2c; }
      .gold { fill: #a27b2c; }
      .gold-stroke { stroke: #a27b2c; }
    </style>
    <pattern id="paper-grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="4" r="0.8" fill="#173b2c" opacity="0.035"/>
      <circle cx="13" cy="11" r="0.7" fill="#a27b2c" opacity="0.035"/>
    </pattern>
  </defs>

  <g id="layer-background" inkscape:groupmode="layer" inkscape:label="01 Background">
    <rect width="3060" height="1460" fill="#f6f0df"/>
    <rect width="3060" height="1460" fill="url(#paper-grain)"/>
  </g>

  <g id="layer-forest-ink" inkscape:groupmode="layer" inkscape:label="02 Forest Ink" fill="#173b2c" transform="translate(30 30)">
    <rect x="38" y="38" width="2924" height="1324" rx="22" fill="none" stroke="#173b2c" stroke-width="6"/>
    <rect x="58" y="58" width="2884" height="1284" rx="16" fill="none" stroke="#173b2c" stroke-width="2"/>

    <line x1="940" y1="90" x2="940" y2="1310" stroke="#173b2c" stroke-width="2" opacity="0.65"/>
    <line x1="2060" y1="90" x2="2060" y2="1310" stroke="#173b2c" stroke-width="2" opacity="0.65"/>

    <g id="front-panel">
      <text x="1500" y="151" class="display" text-anchor="middle" font-size="116" letter-spacing="15">HESPERIDES</text>
      <path d="M1115 184 H1885" fill="none" stroke="#173b2c" stroke-width="2"/>
      <text x="1500" y="220" class="sans" text-anchor="middle" font-size="23" letter-spacing="9">MYTHIC BOTANICAL TEA HOUSE</text>

      <image x="1102" y="258" width="796" height="835"
             preserveAspectRatio="xMidYMid meet"
             xlink:href="hesperides-engraving-one-color.svg"
             href="hesperides-engraving-one-color.svg"/>

      <text x="1500" y="1160" class="serif" text-anchor="middle" font-size="31" font-style="italic" letter-spacing="2">A garden beyond the western horizon</text>
      <text x="1500" y="1230" class="display" text-anchor="middle" font-size="58" letter-spacing="8">THE GOLDEN GARDEN</text>
      <text x="1500" y="1285" class="sans" text-anchor="middle" font-size="24" letter-spacing="7">LOOSE-LEAF TEA · STYLE STUDY</text>
    </g>

    <g id="left-panel">
      <text x="130" y="145" class="sans" font-size="22" letter-spacing="3">SELF-INITIATED / SPECULATIVE STYLE STUDY</text>
      <circle cx="480" cy="395" r="145" fill="none" stroke="#173b2c" stroke-width="3"/>
      <circle cx="480" cy="395" r="127" fill="none" stroke="#173b2c" stroke-width="1.5"/>
      <text x="480" y="448" class="display" text-anchor="middle" font-size="168">H</text>
      <text x="480" y="596" class="sans" text-anchor="middle" font-size="24" letter-spacing="8">THE HOUSE</text>
      <path d="M270 632 H690" fill="none" stroke="#173b2c" stroke-width="2"/>
      <text x="480" y="700" class="serif" text-anchor="middle" font-size="28">
        <tspan x="480" dy="0">An imagined tea house drawn from</tspan>
        <tspan x="480" dy="44">myth, old maps, and the precision</tspan>
        <tspan x="480" dy="44">of antique botanical plates.</tspan>
      </text>
      <text x="480" y="885" class="serif" text-anchor="middle" font-size="24" font-style="italic">
        <tspan x="480" dy="0">Concept copy only.</tspan>
        <tspan x="480" dy="38">Final story follows the client brief.</tspan>
      </text>
      <path d="M250 1010 H710" fill="none" stroke="#173b2c" stroke-width="1"/>
      <text x="480" y="1063" class="sans" text-anchor="middle" font-size="22" letter-spacing="3">FOREST INK / WARM IVORY / GOLD PREVIEW</text>
      <text x="480" y="1128" class="serif" text-anchor="middle" font-size="24">
        <tspan x="480" dy="0">Vector layout · editable layers</tspan>
        <tspan x="480" dy="34">layout adapts to supplied dieline</tspan>
      </text>
    </g>

    <g id="right-panel">
      <text x="2520" y="145" class="sans" text-anchor="middle" font-size="24" letter-spacing="5">BREWING RITUAL</text>
      <path d="M2260 180 H2780" fill="none" stroke="#173b2c" stroke-width="2"/>
      <g transform="translate(2520 318)">
        <path d="M-110 35 H110 M-82 -15 H82" fill="none" stroke="#173b2c" stroke-width="5" stroke-linecap="round"/>
        <path d="M-70 -15 C-78 -75 -48 -108 0 -108 C48 -108 78 -75 70 -15" fill="none" stroke="#173b2c" stroke-width="5"/>
        <path d="M-95 35 C-78 112 78 112 95 35" fill="none" stroke="#173b2c" stroke-width="5"/>
      </g>
      <text x="2520" y="514" class="serif" text-anchor="middle" font-size="29">
        <tspan x="2520" dy="0">Water, measure, temperature,</tspan>
        <tspan x="2520" dy="44">and steep time are reserved for</tspan>
        <tspan x="2520" dy="44">the final blend specification.</tspan>
      </text>

      <rect x="2245" y="705" width="550" height="2"/>
      <text x="2245" y="770" class="sans" font-size="24" letter-spacing="3">PRODUCTION-AWARE SYSTEM</text>
      <text x="2245" y="825" class="serif" font-size="24">
        <tspan x="2245" dy="0">· Two named layout color layers</tspan>
        <tspan x="2245" dy="42">· 3 mm bleed and named safe area</tspan>
        <tspan x="2245" dy="42">· Live type for concept review</tspan>
        <tspan x="2245" dy="42">· One-color vector art direction</tspan>
        <tspan x="2245" dy="42">· Final build follows printer specs</tspan>
      </text>

      <rect x="2245" y="1080" width="550" height="120" rx="6" fill="none" stroke="#173b2c" stroke-width="2"/>
      <text x="2520" y="1128" class="sans" text-anchor="middle" font-size="22" letter-spacing="2">RESERVED PRODUCT-COPY AREA</text>
      <text x="2520" y="1170" class="serif" text-anchor="middle" font-size="24" font-style="italic">Final regulatory copy supplied by the brand</text>
      <text x="2520" y="1285" class="sans" text-anchor="middle" font-size="22" letter-spacing="3">NOT CLIENT WORK · NO PERFORMANCE CLAIM</text>
    </g>

    <path d="M80 150 V80 H150 M2850 80 H2920 V150 M80 1250 V1320 H150 M2850 1320 H2920 V1250"
          fill="none" stroke="#173b2c" stroke-width="8" stroke-linecap="square"/>
  </g>

  <g id="layer-spot-gold" inkscape:groupmode="layer" inkscape:label="03 Gold Preview — final swatch per printer" data-ink="visual preview only; confirm ink or foil specification with printer" fill="#a27b2c" transform="translate(30 30)">
    <circle cx="1500" cy="190" r="6"/>
    <circle cx="1082" cy="190" r="5"/>
    <circle cx="1918" cy="190" r="5"/>
    <path d="M1400 1250 H1600" fill="none" stroke="#a27b2c" stroke-width="4"/>
    <circle cx="480" cy="395" r="116" fill="none" stroke="#a27b2c" stroke-width="3" stroke-dasharray="4 14"/>
    <circle cx="2520" cy="318" r="130" fill="none" stroke="#a27b2c" stroke-width="2"/>
    <g id="golden-apples" stroke="#173b2c" stroke-width="2" stroke-linejoin="round">
      <g transform="translate(1539 429)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
      <g transform="translate(1496 475) scale(.9)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
      <g transform="translate(1575 484) scale(1.05)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
      <g transform="translate(1628 533)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
      <g transform="translate(1523 579) scale(1.1)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
      <g transform="translate(1635 617) scale(.9)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
      <g transform="translate(1602 658)"><path d="M-11 0 C-11 -9 -5 -14 1 -12 C8 -15 14 -9 13 0 C12 10 5 16 1 16 C-4 16 -11 10 -11 0 Z"/><path d="M1 -12 C2 -18 7 -20 11 -19" fill="none"/><path d="M5 -15 C9 -19 14 -18 15 -14 C11 -12 8 -12 5 -15 Z" fill="#173b2c" stroke="none"/></g>
    </g>
    <text x="2520" y="1238" class="sans" text-anchor="middle" font-size="22" letter-spacing="2">GOLD PREVIEW LAYER · FINAL SWATCH PER PRINTER</text>
  </g>

  <g id="layer-guides" inkscape:groupmode="layer" inkscape:label="99 Guides — hidden for preview" fill="none" style="display:none">
    <rect x="30" y="30" width="3000" height="1400" stroke="#e13d3d" stroke-width="2" stroke-dasharray="14 10" opacity="0.55"/>
    <rect x="60" y="60" width="2940" height="1340" stroke="#287ec1" stroke-width="2" stroke-dasharray="8 10" opacity="0.45"/>
  </g>
</svg>
