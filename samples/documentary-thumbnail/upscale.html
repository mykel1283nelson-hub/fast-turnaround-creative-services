<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Documentary thumbnail export</title>
  <style>
    html, body { margin: 0; background: #000; }
    canvas { display: block; width: 1920px; height: 1080px; }
  </style>
</head>
<body>
  <canvas id="output" width="1920" height="1080"></canvas>
  <img id="export" alt="" hidden>
  <script>
    const image = new Image();
    image.src = "who-owns-the-moon.png";
    image.addEventListener("load", () => {
      const canvas = document.getElementById("output");
      const context = canvas.getContext("2d");
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.drawImage(image, 0, 0, 1920, 1080);
      document.getElementById("export").src = canvas.toDataURL("image/png");
      document.documentElement.dataset.ready = "true";
    });
  </script>
</body>
</html>
